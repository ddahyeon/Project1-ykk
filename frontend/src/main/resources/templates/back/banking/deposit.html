<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>입출금 하기</title>
    <script>
        // 폼이 제출될 때 실행되는 함수입니다.
        function handleTransferSubmit(event) {
            event.preventDefault(); // 폼의 기본 제출 동작을 잠깐 멈춥니다.

            const form = document.getElementById("transferForm");
            // 사용자가 선택한 라디오 버튼의 값을 가져옵니다.
            const transactionType = document.querySelector('input[name="transactionType"]:checked').value;

            // 선택된 값에 따라 폼이 전송될 백엔드 주소(action)를 동적으로 변경합니다!
            if (transactionType === 'deposit') {
                form.action = '/banking/deposit';
            } else if (transactionType === 'withdraw') {
                form.action = '/banking/withdraw';
            }

            form.submit(); // 목적지가 정해졌으니 폼을 제출합니다.
        }
    </script>
</head>
<body>
<h2>입금 / 출금 (기본 입출금 계좌)</h2>

<form id="transferForm" method="post" onsubmit="handleTransferSubmit(event)">

    <input type="hidden" name="savingtype" value="0">

    <div>
        <label>거래 종류 :</label>
        <input type="radio" id="typeDeposit" name="transactionType" value="deposit" checked>
        <label for="typeDeposit">입금</label>

        <input type="radio" id="typeWithdraw" name="transactionType" value="withdraw">
        <label for="typeWithdraw">출금</label>
    </div>
    <br>

    <div>
        <label for="amount">금액 :</label>
        <input type="number" id="amount" name="amount" min="1" placeholder="금액을 입력하세요" required> 원
    </div>
    <br>

    <button type="submit">실행하기</button>
    <a th:href="@{/main}">취소하고 돌아가기</a>
</form>
</body>
</html>
