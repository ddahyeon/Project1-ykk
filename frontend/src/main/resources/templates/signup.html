<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
    <script>

        function handleSignup(event) {
            event.preventDefault(); // 폼의 기본 제출(Form-urlencoded) 동작을 막음

            const userid = document.getElementById("userid").value;
            const password = document.getElementById("password").value;
            const username = document.getElementById("username").value;
            const birthday = document.getElementById("birthday").value;

            const signupData = {
                userid: userid,
                password: password,
                username: username,
                birthday: birthday
            };

            fetch("http://localhost:8080/api/user/signup", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json" // 백엔드가 원하는 타입 명시
                },
                body: JSON.stringify(signupData) // 데이터를 JSON 문자열로 변환
            })
            .then(response => response.json())
            .then(data => {

                alert(data.message || "회원가입이 완료되었습니다!");

                window.location.href = "/login";
            })
            .catch(error => {
                console.error("Error:", error);
                alert("회원가입 중 오류가 발생했습니다.");
            });
        }
    </script>
</head>
<body>
<h2>회원가입</h2>

<form onsubmit="handleSignup(event)">
    <div>
        <label>이름: </label>
        <input type="text" id="username" required />
    </div>
    <div>
        <label>생년월일 (yyyy-mm-dd): </label>
        <input type="text" id="birthday" placeholder="2026-06-29" required />
    </div>
    <div>
        <label>아이디: </label>
        <input type="text" id="userid" required />
    </div>
    <div>
        <label>비밀번호: </label>
        <input type="password" id="password" required />
    </div>
    <button type="submit">가입하기</button>
</form>
<br>
<a th:href="@{/login}">로그인 화면으로</a>
</body>
</html>
