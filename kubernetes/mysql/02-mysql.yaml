# 02-mysql.yaml

apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv-node1
spec:
  capacity:
    storage: 2Gi                     # MySQL 데이터 저장공간 요청
  accessModes:
    - ReadWriteOnce                  # 하나의 노드에서 읽기/쓰기 가능
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  local:
    path: /data/mysql
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - node1

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: ykk
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: ykk
spec:
  selector:
    app: ykk-mysql          # app=ykk-mysql 라벨을 가진 Pod와 연결
  ports:
    - port: 3306            # Service 포트
      targetPort: 3306      # MySQL 컨테이너 포트
  type: ClusterIP           # 클러스터 내부에서만 접근 가능

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ykk-mysql
  namespace: ykk
spec:
  serviceName: mysql-service
  replicas: 1                 # 테스트 환경이어서 MySQL Pod 1개 실행으로 했습니다.
  selector:
    matchLabels:
      app: ykk-mysql
  template:
    metadata:
      labels:
        app: ykk-mysql         # Service가 찾을 Pod 라벨
    spec:
      nodeName: node1
      containers:
        - name: mysql
          image: mysql:8.3      # MySQL 공식 Docker 이미지 
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: ykk-config
                  key: DB_NAME

            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER

            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD

            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_ROOT_PASSWORD

          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql       # MySQL 데이터 저장 경로

      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc              # PVC와 연결하여 데이터 유지