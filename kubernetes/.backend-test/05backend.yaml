apiVersion: v1
kind: Service
metadata:
  name: ykk-backend-service
  namespace: ykk
spec:
  selector:
    app: ykk-backend           # Backend Pod와 연결
  ports:
    - port: 8080               # Service 포트
      targetPort: 8080         # SpringBoot 컨테이너 포트
      nodePort: 30080             # ClusterIP 사용 시 삭제 - 외부 접근
  type: NodePort
  # type: ClusterIP              # 외부에 공개하지 않는 내부 Service

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: ykk-backend
  namespace: ykk
  labels:
    app: ykk-backend  
spec:
  replicas: 1                  # 테스트 환경으로 Backend Pod 1개 실행으로 설정했습니다.
  selector:
    matchLabels:               
      app: ykk-backend
  template:
    metadata:
      labels:                    
        app: ykk-backend
    spec:
      containers:
        - name: ykk-backend
          image: tak47onejoon/ykk_backend  # 이미지 가져와야 됨
          ports:
            - containerPort: 8080            # SpringBoot 실행 포트
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: ykk-config
                  key: DB_HOST                # MySQL Service 주소
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: ykk-config
                  key: DB_PORT                # MySQL 포트
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: ykk-config
                  key: DB_NAME                # DB 이름
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_USER             # DB 사용자 계정
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: MYSQL_PASSWORD          # DB 비밀번호