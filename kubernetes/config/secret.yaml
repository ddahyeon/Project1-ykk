# secret.yaml

apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: ykk
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: "<ROOT_PASSWORD>"   # MySQL root 계정 비밀번호
  MYSQL_USER: "<MYSQL_USER>"               # Backend에서 사용할 계정 DB 계정
  MYSQL_PASSWORD: "<MYSQL_PASSWORD>"       # Backend에서 사용할 DB 비밀번호
