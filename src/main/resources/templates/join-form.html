<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>적금 가입 신청</title>
</head>
<body>
<h1>적금 가입 신청서</h1>
<form id="joinForm" onsubmit="executeJoin(event)">
    <label>선택한 상품:</label>
    <input type="text" id="productName" readonly><br><br>
    <div id="dollarInfoArea" style="display: none; background-color: #f0f8ff; padding: 10px; margin-bottom: 20px;">
        <strong>[외환 적금 전용] 실시간 달러 환율 💵</strong><br>
        현재 1달러 = <span id="dollarRate" style="color: blue; font-weight: bold;">로딩 중...</span>
    </div>
    <label>출금 가능 잔액 (기본 계좌):</label>
    <input type="text" id="availableBalance" readonly style="color: black; font-weight: bold;" value="잔액 조회 중..."><br><br>
    <label>최초 입금액 (원화 기준):</label>
    <input type="number" id="initDeposit" required placeholder="가입 금액을 입력하세요"><br><br>
    <button type="submit">최종 가입</button>
    <button type="button" onclick="location.href='/products'">취소</button>
</form>

<script>

    const urlParams = new URLSearchParams(window.location.search);
    const productType = urlParams.get('type');
    const productName = urlParams.get('name');
    const loginId = sessionStorage.getItem("loginId");

    let maxAvailableBalance = 0;


    document.addEventListener('DOMContentLoaded', init);


    async function init() {
        checkLoginStatus();

        // 상품명 세팅
        if (productName) {
            document.getElementById('productName').value = productName;
        }

        // 기본 계좌 잔액 가져오기
        await fetchBaseAccountBalance();

        // 외환 적금(타입 2)인 경우 환율 정보 가져오기
        if (productType === '2') {
            await fetchExchangeRate();
        }
    }

    function checkLoginStatus() {
        if (!loginId) {
            alert("로그인 정보가 없습니다. 다시 로그인해 주세요.");
            window.location.href = "/";
        }
    }

    //잔액&환율
    async function fetchBaseAccountBalance() {
        const balanceInput = document.getElementById('availableBalance');

        try {
            const response = await fetch("/api/bank/show", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userid: loginId })
            });

            const data = await response.json();
            console.log("백엔드 응답 데이터:", data);

            const accountList = Array.isArray(data) ? data : (data.list || data.accounts || [data]);
            const generalAccount = accountList.find(acc => acc.savingtype === "DEFAULT");

            if (generalAccount) {
                maxAvailableBalance = generalAccount.amount;
                balanceInput.value = `${maxAvailableBalance.toLocaleString()} 원`;
            } else {
                balanceInput.value = "0 원 (기본 계좌 찾기 실패)";
            }
        } catch (error) {
            console.error("잔액 조회 실패:", error);
            balanceInput.value = "잔액 정보 불러오기 실패";
        }
    }

    async function fetchExchangeRate() {
        const dollarInfoArea = document.getElementById('dollarInfoArea');
        const dollarRateText = document.getElementById('dollarRate');

        dollarInfoArea.style.display = 'block';

        try {
            const response = await fetch("/api/bank/dollar", { method: "GET" });
            const data = await response.json();

            if (data.dollar) {
                dollarRateText.innerText = `${data.dollar.toLocaleString()} 원`;
            } else {
                dollarRateText.innerText = "환율 정보를 불러올 수 없습니다.";
            }
        } catch (error) {
            console.error("환율 API 호출 에러:", error);
            dollarRateText.innerText = "환율 서버 점검 중";
        }
    }

    //선출금-> 가입
    async function executeJoin(event) {
        event.preventDefault();

        const depositAmount = parseInt(document.getElementById("initDeposit").value);

        //가입 금액 유효성 체크
        if (depositAmount <= 0) {
            alert("입금액은 0원보다 커야 합니다.");
            return;
        }
        if (depositAmount > maxAvailableBalance) {
            alert(`기본 계좌의 잔액이 부족합니다! \n(현재 잔액: ${maxAvailableBalance.toLocaleString()}원)`);
            return;
        }

        try {
            //선출금
            const withdrawResponse = await fetch("/api/bank/withdraw", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ userid: loginId, amount: depositAmount })
            });

            if (!withdrawResponse.ok) {
                alert("기본 계좌에서 가입 금액을 출금하는 데 실패했습니다. 다시 시도해 주세요.");
                return;
            }

            // 적금 가입 요청
            const registResponse = await fetch("/api/bank/regist", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    userid: loginId,
                    type: parseInt(productType),
                    initdeposit: depositAmount
                })
            });

            //결과
            if (registResponse.ok) {
                alert(`성공적으로 ${productName}에 가입되었습니다! 🎉\n(기본 계좌에서 ${depositAmount.toLocaleString()}원이 이동되었습니다.)`);
                window.location.href = "/main";
            } else {
                alert("기본 계좌에서 출금은 완료되었으나, 적금 계좌 생성에 실패했습니다. 관리자에게 문의하세요.");
            }

        } catch (error) {
            console.error("프로세스 진행 중 오류 발생:", error);
            alert("서버 통신 중 오류가 발생했습니다.");
        }
    }
</script>
</body>
</html>
